<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>AgenditApp · Mejoras de calendario</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #F4F1EB; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared-controls.jsx"></script>
<script type="text/babel" src="v0-before.jsx"></script>
<script type="text/babel" src="v1-branded.jsx"></script>
<script type="text/babel" src="v2-heatmap.jsx"></script>
<script type="text/babel" src="v3-sidepanel.jsx"></script>

<script type="text/babel">
const App = () => {
  const Frame = ({ children }) => (
    <div style={{ width: "100%", height: "100%", overflow: "hidden", borderRadius: 6 }}>
      {children}
    </div>
  );

  return (
    <DesignCanvas
      title="AgenditApp · Mejoras de calendario"
      subtitle="Compara el diseño actual con tres direcciones de mejora. Click en los días para interactuar."
    >
      <DCSection id="actual" title="Punto de partida">
        <DCArtboard id="v0" label="Antes (vista actual)" width={1100} height={620}>
          <Frame><V0Before /></Frame>
        </DCArtboard>
      </DCSection>

      <DCSection id="propuestas" title="Propuestas de mejora">
        <DCArtboard
          id="v1"
          label="V1 · Pulido con marca"
          width={1100}
          height={620}
        >
          <Frame><V1Branded /></Frame>
        </DCArtboard>

        <DCArtboard
          id="v2"
          label="V2 · Heatmap de carga"
          width={1100}
          height={620}
        >
          <Frame><V2Heatmap /></Frame>
        </DCArtboard>

        <DCArtboard
          id="v3"
          label="V3 · Calendario + panel del día"
          width={1280}
          height={700}
        >
          <Frame><V3SidePanel /></Frame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
